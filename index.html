<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopPro | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; color: #1d1d1f; scroll-behavior: smooth; }
        
        /* Glassmorphism Effect */
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Smooth Card Hover */
        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Cart Sidebar Animation */
        #cart-sidebar {
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .sidebar-open { transform: translateX(0) !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter">
            SHOP<span class="text-blue-600">PRO.</span>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-black transition">Store</a>
                <a href="#" class="hover:text-black transition">Mac</a>
                <a href="#" class="hover:text-black transition">Support</a>
            </div>
            <button onclick="toggleCart()" class="relative p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </nav>

    <section class="py-20 px-6 text-center max-w-4xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">The future of <span class="text-blue-600">shopping</span> is here.</h1>
        <p class="text-xl text-gray-500 mb-10">Experience the world's most advanced AI-powered marketplace.</p>
        <div class="flex justify-center gap-4">
            <button class="bg-black text-white px-8 py-3 rounded-full font-semibold hover:bg-gray-800 transition">Buy Now</button>
            <button class="text-blue-600 font-semibold hover:underline">Learn more ></button>
        </div>
    </section>

    <main class="container mx-auto px-6 pb-24">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            </div>
    </main>

    <div id="cart-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden z-[60]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 w-full md:w-[400px] h-full bg-white z-[70] shadow-2xl p-8 translate-x-full">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Bag</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-black"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div id="cart-items" class="overflow-y-auto h-[60vh] pr-2">
            </div>

        <div class="absolute bottom-0 left-0 w-full p-8 bg-gray-50 border-t">
            <div class="flex justify-between text-lg mb-4">
                <span class="text-gray-500">Subtotal</span>
                <span class="font-bold">₹<span id="cart-total">0</span></span>
            </div>
            <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition">
                Check Out
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Apple Watch Ultra", price: 89900, img: "https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?w=500" },
            { id: 2, name: "AirPods Max", price: 59900, img: "https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=500" },
            { id: 3, name: "MacBook Pro M3", price: 169900, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500" },
            { id: 4, name: "iPhone 16 Pro", price: 119900, img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba3f21?w=500" }
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-[2rem] p-6 text-center border border-gray-100 shadow-sm">
                    <img src="${p.img}" class="w-full h-48 object-contain mb-6 mix-blend-multiply">
                    <h3 class="text-lg font-semibold mb-2">${p.name}</h3>
                    <p class="text-gray-500 mb-4">From ₹${p.price.toLocaleString()}</p>
                    <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white w-10 h-10 rounded-full hover:bg-blue-700 shadow-md">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            
            itemsDiv.innerHTML = cart.map((item, i) => `
                <div class="flex gap-4 items-center mb-6 animate-fadeIn">
                    <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover bg-gray-100">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-xs text-gray-400">₹${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${i})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-can"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = total.toLocaleString();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            updateUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('sidebar-open');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        renderProducts();
    </script>
</body>
</html>
